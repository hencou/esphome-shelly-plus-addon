# =============================================================================
# Shelly 2PM Gen3 with Shelly Plus Add-On - Minimal Example
# =============================================================================
#
# Minimal configuration for DS18B20 temperature sensor only.
# For a complete example with all features, see shelly-2pm-gen3-full.yaml
#
# =============================================================================

substitutions:
  device_name: shelly-2pm-gen3

esphome:
  name: ${device_name}

esp32:
  variant: esp32c3
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
api:
ota:

# External component for Shelly Plus Add-On
external_components:
  - source:
      type: git
      url: https://github.com/majoto85/esphome-shelly-plus-addon
      ref: main
    components: [shelly_dallas]

# 1-Wire bus configuration
shelly_dallas:
  pin_tx: GPIO9
  pin_rx: GPIO21
  update_interval: 30s

sensor:
  # DS18B20 Temperature Sensor
  - platform: shelly_dallas
    name: "Temperature"
    resolution: 12
    # max_errors: 5  # Consecutive errors before NaN (default: 5)
